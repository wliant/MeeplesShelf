# Application service — extends docker-compose.infra.yml.
# Usage: docker compose -f docker-compose.infra.yml -f docker-compose.app.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_DATABASE_URL: ${APP_DATABASE_URL}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_S3_ENDPOINT_URL: ${APP_S3_ENDPOINT_URL}
      APP_S3_ACCESS_KEY: ${APP_S3_ACCESS_KEY}
      APP_S3_SECRET_KEY: ${APP_S3_SECRET_KEY}
      APP_S3_BUCKET: ${APP_S3_BUCKET:-meeplesshelf}
      APP_S3_PUBLIC_URL: ${APP_S3_PUBLIC_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8000}:8000"
