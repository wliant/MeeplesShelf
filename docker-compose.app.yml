# Application service — extends docker-compose.infra.yml.
# Usage: docker compose -f docker-compose.infra.yml -f docker-compose.app.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    environment:
      APP_DATABASE_URL: ${APP_DATABASE_URL}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
